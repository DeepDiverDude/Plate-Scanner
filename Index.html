<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nummerplåts-skanner</title>
    <style>
        video { width: 100%; max-width: 500px; border-radius: 10px; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        button { padding: 15px; font-size: 18px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Bil-skanner</h1>
    
    <!-- Här visas kamerabilden -->
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="capture">Fånga bild & sök nummer</button>

    <div class="result">
        <p id="status">Status: Väntar...</p>
        <p id="plate">Nummer: -</p>
        <p id="location">Position: -</p>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="photo" style="width:100%; margin-top:10px; border-radius: 10px;">
    </div>

    <!-- Hämta biblioteket för textigenkänning (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('photo');
        const status = document.getElementById('status');
        const plateText = document.getElementById('plate');
        const locationText = document.getElementById('location');

        // 1. Starta kameran (iPhone 15 Pro har fantastiska kameror!)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { status.innerText = "Kamerafel: " + err; });

        // 2. När användaren trycker på knappen
        document.getElementById('capture').addEventListener('click', () => {
            status.innerText = "Hämtar position och analyserar bild...";

            // Hämta GPS
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                locationText.innerText = `Position: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                
                // Skapa en länk till Google Maps
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                locationText.innerHTML += ` <a href="${mapsUrl}" target="_blank">[Karta]</a>`;

                // Ta en bild från videon
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/png');
                photo.src = dataUrl;

                // 3. Kör OCR för att hitta texten
                Tesseract.recognize(dataUrl, 'eng') // 'eng' fungerar ofta bäst för svenska skyltar
                    .then(({ data: { text } }) => {
                        // Här kan vi använda Regex för att bara hitta svenska skyltar
                        const cleanText = text.replace(/[^a-zA-Z0-9]/g, ' ');
                        plateText.innerText = "Hittad text: " + cleanText;
                        status.innerText = "Klar!";
                    });
            });
        });
    </script>
</body>
</html>
