<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateMaster 11.0 - Set Progress</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30; --bg: #000; --card: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(28,28,30,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px); }
        .tab { text-align: center; color: #888; font-size: 11px; flex-grow: 1; border: none; background: none; }
        .tab.active { color: var(--ios-blue); }

        .page { display: none; }
        .page.active { display: block; }

        /* Skanner */
        #cam-container { position: relative; height: 45vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #sikte { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 70px; border: 2px solid var(--ios-green); border-radius: 12px; pointer-events: none; }
        
        .scan-status { padding: 15px; background: var(--card); border-bottom: 1px solid #333; }
        
        /* Redigerbar Target Box */
        .target-box { 
            background: var(--ios-red); padding: 10px 20px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: transform 0.1s; 
        }
        .target-box:active { transform: scale(0.95); background: #cc2f26; }

        /* Arkiv */
        .search-container { padding: 15px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--card); color: #fff; font-size: 18px; box-sizing: border-box; text-align: center; }
        .gallery { padding: 10px; }
        .plate-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; }
        .plate-card img { width: 100%; height: auto; display: block; }
        .plate-card-info { padding: 15px; }
        
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 13px; text-align: center; text-decoration: none; cursor: pointer; }
        .btn-edit { background: #3a3a3c; color: var(--ios-blue); }
        .btn-delete { background: #3a3a3c; color: var(--ios-red); }
        .btn-map { background: var(--ios-blue); color: #fff; }

        #debug-log { font-family: monospace; font-size: 11px; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px; position: absolute; bottom: 0; width: 100%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="page-scan" class="page active">
        <div id="cam-container">
            <video id="video" autoplay playsinline></video>
            <div id="sikte"></div>
            <div id="debug-log">Väntar...</div>
        </div>
        <div class="scan-status">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-size: 11px; color: #aaa;">IDENTIFIERAT</div>
                    <div id="live-plate" style="font-size: 32px; font-weight: bold; color: var(--ios-green);">--- ---</div>
                </div>
                <!-- Klickbar box för att ändra nummer -->
                <div class="target-box" onclick="setManualTarget()">
                    <div style="font-size: 10px;">NÄSTA (ÄNDRA)</div>
                    <div id="target-num" style="font-size: 32px; font-weight: bold;">001</div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-archive" class="page">
        <div class="search-container">
            <input type="number" id="search-num" placeholder="Sök siffra..." oninput="renderArchive()">
        </div>
        <div id="gallery" class="gallery"></div>
    </div>

    <nav class="tab-bar">
        <button class="tab active" onclick="showPage('scan')">📷 SKANNA</button>
        <button class="tab" onclick="showPage('archive')">🗂️ ARKIV</button>
    </nav>

    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <canvas id="ocr-canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        let db;
        let currentTarget = 1;
        let isProcessing = false;
        let lastPos = null;
        const cooldowns = new Map();

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'archive') renderArchive();
        }

        // --- MANUELL ÄNDRING AV NUMMER ---
        function setManualTarget() {
            const val = prompt("Vilket nummer vill du leta efter nu? (1-999)", currentTarget);
            if (val !== null) {
                const num = parseInt(val);
                if (num >= 1 && num <= 999) {
                    currentTarget = num;
                    localStorage.setItem('plateTarget', currentTarget); // Spara valet
                    updateTargetUI();
                } else {
                    alert("Ange ett nummer mellan 1 och 999.");
                }
            }
        }

        // --- INITIALISERING ---
        const req = indexedDB.open("PlateMasterV11", 1);
        req.onupgradeneeded = e => {
            const store = e.target.result.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
            store.createIndex("num", "num", { unique: false });
        };
        req.onsuccess = e => { 
            db = e.target.result; 
            // Ladda sparat nummer från localStorage om det finns
            const saved = localStorage.getItem('plateTarget');
            if (saved) {
                currentTarget = parseInt(saved);
            }
            updateTargetUI(); 
        };

        navigator.geolocation.watchPosition(p => { lastPos = p.coords; }, null, { enableHighAccuracy: true });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920 } })
            .then(s => { 
                document.getElementById('video').srcObject = s; 
                setInterval(doScan, 800); 
            });

        // --- SCANNING ---
        async function doScan() {
            if (isProcessing || !db || !document.getElementById('page-scan').classList.contains('active')) return;
            isProcessing = true;

            const video = document.getElementById('video');
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const ocrCanvas = document.getElementById('ocr-canvas');
            const w = canvas.width * 0.7; const h = canvas.height * 0.15;
            ocrCanvas.width = w; ocrCanvas.height = h;
            const oCtx = ocrCanvas.getContext('2d');
            oCtx.drawImage(canvas, (canvas.width-w)/2, (canvas.height-h)/2, w, h, 0, 0, w, h);

            try {
                const res = await Tesseract.recognize(ocrCanvas.toDataURL(), 'eng');
                const raw = res.data.text.replace(/\s/g, '').toUpperCase();
                document.getElementById('debug-log').innerText = "AI SER: " + raw;

                const match = raw.match(/[A-Z0-9]{6}/);
                if (match) processPlate(match[0], canvas.toDataURL('image/jpeg', 0.5));
            } catch (e) {}
            isProcessing = false;
        }

        function processPlate(raw, img) {
            let part1 = raw.substring(0, 3).replace(/0/g, 'O').replace(/1/g, 'I').replace(/5/g, 'S').replace(/8/g, 'B');
            let part2 = raw.substring(3, 6).replace(/O/g, '0').replace(/I/g, '1').replace(/L/g, '1').replace(/S/g, '5').replace(/B/g, '8');
            const cleanPlate = part1 + part2;
            
            if (!/^[A-Z]{3}[0-9]{3}$/.test(cleanPlate)) return;

            const numValue = parseInt(part2);
            document.getElementById('live-plate').innerText = cleanPlate;

            const now = Date.now();
            if (cooldowns.has(cleanPlate) && (now - cooldowns.get(cleanPlate) < 30000)) return;

            const isMatch = (numValue === currentTarget);
            const entry = {
                plate: cleanPlate,
                num: numValue,
                image: img,
                lat: lastPos?.latitude,
                lon: lastPos?.longitude,
                isMatch: isMatch,
                time: new Date().toLocaleString('sv-SE')
            };

            const tx = db.transaction("plates", "readwrite");
            tx.objectStore("plates").add(entry).onsuccess = () => {
                cooldowns.set(cleanPlate, now);
                if (isMatch) {
                    alert("TRÄFF! " + cleanPlate);
                    currentTarget++;
                    localStorage.setItem('plateTarget', currentTarget); // Spara automatiskt framsteg
                    updateTargetUI();
                }
            };
        }

        // --- UI UPPDATERING ---
        function updateTargetUI() {
            document.getElementById('target-num').innerText = currentTarget.toString().padStart(3, '0');
        }

        function deleteEntry(id) {
            if (confirm("Vill du radera denna skanning?")) {
                const tx = db.transaction("plates", "readwrite");
                tx.objectStore("plates").delete(id).onsuccess = () => renderArchive();
            }
        }

        function editEntry(id, currentPlate) {
            const newPlate = prompt("Redigera regnr (ABC123):", currentPlate);
            if (newPlate && newPlate.length === 6) {
                const tx = db.transaction("plates", "readwrite");
                const store = tx.objectStore("plates");
                store.get(id).onsuccess = e => {
                    const data = e.target.result;
                    data.plate = newPlate.toUpperCase();
                    data.num = parseInt(newPlate.substring(3));
                    store.put(data).onsuccess = () => renderArchive();
                };
            }
        }

        function renderArchive() {
            const filter = document.getElementById('search-num').value;
            db.transaction("plates", "readonly").objectStore("plates").getAll().onsuccess = e => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                e.target.result.reverse().filter(i => !filter || i.num.toString().padStart(3,'0').includes(filter)).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'plate-card';
                    card.innerHTML = `
                        <img src="${item.image}">
                        <div class="plate-card-info">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <div>
                                    <strong style="font-size:24px;">${item.plate}</strong>
                                    <div style="font-size:11px; color:#888">${item.time}</div>
                                </div>
                                ${item.isMatch ? '<span style="color:var(--ios-green); font-size:10px; font-weight:bold;">● SERIE</span>' : ''}
                            </div>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="editEntry(${item.id}, '${item.plate}')">ÄNDRA</button>
                                <button class="btn btn-delete" onclick="deleteEntry(${item.id})">RADERA</button>
                                <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="btn btn-map">KARTA</a>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            };
        }
    </script>
</body>
</html>
