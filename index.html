<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Skanner 001-999</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; z-index: 10; background: #000; }
        video { width: 100%; height: 40vh; object-fit: cover; border-bottom: 2px solid #333; }
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60%; height: 40px; border: 2px solid #00ff00; border-radius: 5px; pointer-events: none;
        }
        .stats { padding: 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .target { font-size: 24px; color: #ff3b30; font-weight: bold; }
        .log { padding: 10px; }
        .log-item { 
            background: #222; margin-bottom: 10px; padding: 10px; border-radius: 10px; 
            display: flex; align-items: center; gap: 10px; font-size: 14px;
        }
        .log-item img { width: 80px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-maps { background: #007AFF; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        #status-light { width: 12px; height: 12px; background: red; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"></div>
    <div class="stats">
        <div>Letar efter: <span class="target" id="target-display">001</span></div>
        <div><span id="status-light"></span> <span id="status-text">Startar...</span></div>
    </div>
</div>

<div class="log" id="log-list">
    <!-- Här hamnar de hittade bilarna -->
    <p style="color: #666; text-align: center;">Inga bilar hittade än. Sikta mot en skylt.</p>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const targetDisplay = document.getElementById('target-display');
    const statusText = document.getElementById('status-text');
    const statusLight = document.getElementById('status-light');
    const logList = document.getElementById('log-list');

    let currentTarget = 1; // Vi börjar på 001
    let isProcessing = false;

    // Starta kameran
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 1280, height: 720 } 
    }).then(stream => { 
        video.srcObject = stream;
        startAutoScan();
    });

    // Huvudloop för skanning
    function startAutoScan() {
        setInterval(async () => {
            if (isProcessing) return; // Kör inte om vi redan analyserar
            isProcessing = true;
            statusLight.style.background = "yellow";
            statusText.innerText = "Skannar...";

            // Ta bild
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

            try {
                const result = await Tesseract.recognize(dataUrl, 'eng', {
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
                });
                
                const rawText = result.data.text.toUpperCase();
                const platePattern = /[A-Z]{3}\s?[0-9]{2}[A-Z0-9]{1}/g;
                const matches = rawText.match(platePattern);

                if (matches) {
                    const plate = matches[0].replace(/\s/g, '');
                    const plateDigits = plate.match(/\d+/); // Extrahera siffrorna

                    if (plateDigits) {
                        const numStr = plateDigits[0].padStart(3, '0'); // Gör om till t.ex. "005"
                        
                        // Kolla om detta är numret vi letar efter
                        if (parseInt(numStr) === currentTarget) {
                            await handleMatch(plate, dataUrl);
                        } else {
                            statusText.innerText = "Såg " + plate + " (Fel nr)";
                        }
                    }
                } else {
                    statusText.innerText = "Söker...";
                }
            } catch (e) {
                console.error(e);
            }

            statusLight.style.background = "green";
            isProcessing = false;
        }, 1500); // Skanna var 1.5 sekund
    }

    async function handleMatch(plate, imageData) {
        // Hämta position
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // Spara och uppdatera UI
            saveFoundCar(plate, imageData, lat, lon);
            
            currentTarget++; // Gå till nästa nummer!
            targetDisplay.innerText = currentTarget.toString().padStart(3, '0');
            
            // Vibrera telefonen (fungerar på Android, iOS kräver användarinteraktion ibland)
            if (navigator.vibrate) navigator.vibrate(200);
            alert("HITTAD! " + plate);
        });
    }

    function saveFoundCar(plate, image, lat, lon) {
        // Ta bort välkomsttexten
        if (currentTarget === 1) logList.innerHTML = '';

        const time = new Date().toLocaleTimeString();
        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
        
        const html = `
            <div class="log-item">
                <img src="${image}">
                <div style="flex-grow:1">
                    <strong>${plate}</strong><br>
                    <span style="font-size:11px; color:#aaa;">${time}</span>
                </div>
                <a href="${mapsUrl}" target="_blank" class="btn-maps">Karta</a>
            </div>
        `;
        logList.insertAdjacentHTML('afterbegin', html);
        
        // HÄR kan man även lägga till kod för att spara i IndexedDB 
        // så att listan finns kvar när du laddar om sidan.
    }
</script>
</body>
</html>
