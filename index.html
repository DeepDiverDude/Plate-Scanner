<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateTracker Pro</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-red: #FF3B30; --ios-green: #34C759; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; margin: 0; }
        
        /* Kamera-sektion */
        #cam-box { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 1px solid #333; }
        video { width: 100%; height: 35vh; object-fit: cover; }
        #scanner-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 50px; border: 2px solid var(--ios-green); border-radius: 8px; pointer-events: none;
        }

        /* Status & Kontroller */
        .status-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1c1c1e; }
        .target-circle { background: var(--ios-red); width: 60px; height: 60px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Sökfunktion */
        .search-box { padding: 10px; background: #1c1c1e; }
        input[type="text"] { width: 90%; padding: 10px; border-radius: 10px; border: none; background: #3a3a3c; color: white; font-size: 16px; margin: 5px auto; display: block; }

        /* Logg/Galleri */
        .log-container { padding: 10px; }
        .card { background: #1c1c1e; border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .plate-id { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        
        .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-danger { background: #333; color: var(--ios-red); margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<div id="cam-box">
    <video id="video" autoplay playsinline></video>
    <div id="scanner-overlay"></div>
    <div class="status-bar">
        <div>
            <div id="status-text" style="font-size: 12px; color: #aaa;">Söker efter nästa...</div>
            <div style="font-size: 18px;">Status: <span id="sync-status" style="color:var(--ios-green)">Aktiv</span></div>
        </div>
        <div class="target-circle">
            <span style="font-size: 10px;">NÄSTA</span>
            <span id="target-num" style="font-size: 20px;">001</span>
        </div>
    </div>
</div>

<div class="search-box">
    <input type="text" id="search-input" placeholder="Sök på nr (t.ex. 007)..." oninput="renderLog()">
</div>

<div class="log-container" id="log-list">
    <!-- Bilderna visas här -->
</div>

<button class="btn btn-danger" onclick="clearDatabase()">Rensa all data</button>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let db;
    let currentTarget = 1;
    let isProcessing = false;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    // --- 1. DATABASHANTERING (IndexedDB) ---
    const request = indexedDB.open("PlateTrackerDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadCurrentProgress();
        renderLog();
    };

    async function loadCurrentProgress() {
        const transaction = db.transaction("plates", "readonly");
        const store = transaction.objectStore("plates");
        const request = store.getAll();
        request.onsuccess = () => {
            const allItems = request.result;
            // Hitta högsta numret vi hittat i ordning
            const foundNumbers = allItems.map(item => parseInt(item.sequenceNum)).sort((a,b) => a-b);
            let next = 1;
            for(let num of foundNumbers) {
                if(num === next) next++;
            }
            currentTarget = next;
            document.getElementById('target-num').innerText = currentTarget.toString().padStart(3, '0');
        };
    }

    // --- 2. KAMERA & ANALYS ---
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 1280, height: 720 } 
    }).then(stream => { 
        video.srcObject = stream;
        setInterval(scan, 1500); 
    });

    async function scan() {
        if (isProcessing) return;
        isProcessing = true;

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

        try {
            const result = await Tesseract.recognize(dataUrl, 'eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
            });
            const text = result.data.text.toUpperCase();
            const platePattern = /[A-Z]{3}\s?[0-9]{2}[A-Z0-9]{1}/;
            const match = text.match(platePattern);

            if (match) {
                const plate = match[0].replace(/\s/g, '');
                const digits = plate.match(/\d+/);
                if (digits) {
                    const num = parseInt(digits[0]);
                    if (num === currentTarget) {
                        await savePlate(plate, num, dataUrl);
                        alert("HITTAD! " + plate);
                        loadCurrentProgress();
                    }
                }
            }
        } catch (e) { console.log(e); }
        isProcessing = false;
    }

    // --- 3. SPARA OCH VISA ---
    async function savePlate(plate, seqNum, image) {
        navigator.geolocation.getCurrentPosition(pos => {
            const item = {
                plate,
                sequenceNum: seqNum.toString().padStart(3, '0'),
                image,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                timestamp: new Date().toLocaleString()
            };
            const tx = db.transaction("plates", "readwrite");
            tx.objectStore("plates").add(item);
            tx.oncomplete = () => renderLog();
        });
    }

    function renderLog() {
        const searchTerm = document.getElementById('search-input').value;
        const tx = db.transaction("plates", "readonly");
        const store = tx.objectStore("plates");
        const request = store.getAll();

        request.onsuccess = () => {
            const logList = document.getElementById('log-list');
            logList.innerHTML = '';
            
            const items = request.result.reverse(); // Visa senaste först
            items.filter(i => i.plate.includes(searchTerm) || i.sequenceNum.includes(searchTerm))
                 .forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}">
                    <div class="card-info">
                        <div>
                            <div class="plate-id">${item.plate}</div>
                            <div style="font-size:11px; color:#888;">${item.timestamp}</div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-blue" onclick="shareImage('${item.image}', '${item.plate}')">Spara/Dela</button>
                            <a class="btn btn-blue" target="_blank" href="https://www.google.com/maps?q=${item.lat},${item.lon}">Karta</a>
                        </div>
                    </div>
                `;
                logList.appendChild(card);
            });
        };
    }

    // Funktion för att använda iPhonens inbyggda dela-meny
    async function shareImage(base64Data, filename) {
        const blob = await fetch(base64Data).then(res => res.blob());
        const file = new File([blob], `${filename}.jpg`, { type: "image/jpeg" });
        
        if (navigator.share) {
            navigator.share({
                files: [file],
                title: 'Registreringsnummer ' + filename,
            }).catch(err => console.log("Delning avbröts"));
        } else {
            alert("Tryck länge på bilden för att spara den manuellt.");
        }
    }

    function clearDatabase() {
        if(confirm("Vill du verkligen radera ALLA sparade bilar?")) {
            const tx = db.transaction("plates", "readwrite");
            tx.objectStore("plates").clear();
            tx.oncomplete = () => {
                currentTarget = 1;
                renderLog();
                loadCurrentProgress();
            };
        }
    }
</script>
</body>
</html>
