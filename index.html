<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateMaster 14.0 - Sound & Pause</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30; --bg: #000; --card: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        
        /* Tabbar */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(28,28,30,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px); }
        .tab { text-align: center; color: #888; font-size: 11px; flex-grow: 1; border: none; background: none; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        .page { display: none; }
        .page.active { display: block; }

        /* SKANNER */
        #cam-container { position: relative; height: 50vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Siktet */
        #sikte { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 50%; height: 40px; border: 2px solid var(--ios-green); border-radius: 4px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none;
            transition: border-color 0.2s;
        }
        #sikte.paused { border-color: #ffcc00; } /* Gult när den pausar */

        .scan-status { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .target-box { background: var(--ios-red); padding: 10px; border-radius: 10px; text-align: center; min-width: 70px; cursor: pointer; }

        /* Arkiv */
        .gallery { padding: 10px; }
        .plate-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; }
        .plate-card img { width: 100%; height: auto; display: block; }
        .plate-card-info { padding: 15px; }
        
        .actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; }
        .btn-edit { background: #3a3a3c; color: var(--ios-blue); }
        .btn-delete { background: #3a3a3c; color: var(--ios-red); }
        .btn-map { background: var(--ios-blue); color: white; text-decoration: none; }

        #debug-log { font-family: monospace; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 4px; position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div id="page-scan" class="page active">
        <div id="cam-container">
            <video id="video" autoplay playsinline></video>
            <div id="sikte"></div>
            <div id="debug-log">Väntar...</div>
        </div>
        <div class="scan-status">
            <div>
                <div style="font-size: 10px; color: #aaa;">IDENTIFIERAT</div>
                <div id="live-plate" style="font-size: 24px; font-weight: bold; color: var(--ios-green); letter-spacing: 2px;">--- ---</div>
            </div>
            <div class="target-box" onclick="setManualTarget()">
                <div style="font-size: 9px;">NÄSTA</div>
                <div id="target-num" style="font-size: 24px; font-weight: bold;">001</div>
            </div>
        </div>
    </div>

    <div id="page-archive" class="page">
        <div style="padding: 15px;">
            <input type="number" id="search-num" placeholder="Sök siffra..." style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--card); color:#fff; font-size:18px; text-align:center;" oninput="renderArchive()">
        </div>
        <div id="gallery" class="gallery"></div>
    </div>

    <nav class="tab-bar">
        <button class="tab active" onclick="initAudioAndShow('scan')">📷 SKANNA</button>
        <button class="tab" onclick="showPage('archive')">🗂️ ARKIV</button>
    </nav>

    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <canvas id="ocr-canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        let db;
        let currentTarget = 1;
        let isProcessing = false;
        let isPaused = false;
        let lastPos = null;
        let audioCtx = null;

        // --- LJUD-FUNKTION ---
        function playSuccessSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Tonen A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Lås upp ljudmotorn (Safari krav)
        function initAudioAndShow(id) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            showPage(id);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const targetPage = document.getElementById('page-' + id);
            if (targetPage) targetPage.classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'archive') renderArchive();
        }

        // --- DATABASE ---
        const req = indexedDB.open("PlateMasterV14", 1);
        req.onupgradeneeded = e => {
            const store = e.target.result.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
            store.createIndex("num", "num", { unique: false });
        };
        req.onsuccess = e => { 
            db = e.target.result; 
            const saved = localStorage.getItem('plateTarget');
            if (saved) currentTarget = parseInt(saved);
            updateTargetUI(); 
        };

        navigator.geolocation.watchPosition(p => { lastPos = p.coords; }, null, { enableHighAccuracy: true });
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 } } })
            .then(s => { document.getElementById('video').srcObject = s; setInterval(doScan, 1000); });

        // --- SCANNING ---
        async function doScan() {
            if (isProcessing || isPaused || !db || !document.getElementById('page-scan').classList.contains('active')) return;
            isProcessing = true;

            const video = document.getElementById('video');
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const ocrCanvas = document.getElementById('ocr-canvas');
            const cropW = canvas.width * 0.35; 
            const cropH = canvas.height * 0.12;
            ocrCanvas.width = cropW * 2;
            ocrCanvas.height = cropH * 2;
            const oCtx = ocrCanvas.getContext('2d');
            oCtx.drawImage(canvas, (canvas.width - cropW)/2, (canvas.height - cropH)/2, cropW, cropH, 0, 0, ocrCanvas.width, ocrCanvas.height);

            // Binarisering för skärpa
            const imgData = oCtx.getImageData(0,0,ocrCanvas.width,ocrCanvas.height);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const avg = (imgData.data[i] + imgData.data[i+1] + imgData.data[i+2]) / 3;
                const v = avg > 125 ? 255 : 0;
                imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = v;
            }
            oCtx.putImageData(imgData, 0, 0);

            try {
                const res = await Tesseract.recognize(ocrCanvas.toDataURL(), 'eng');
                const raw = res.data.text.replace(/[^A-Z0-9]/g, '');
                document.getElementById('debug-log').innerText = "AI SER: " + raw;

                if (raw.length >= 6) {
                    const match = raw.substring(raw.length - 6);
                    processPlate(match, canvas.toDataURL('image/jpeg', 0.6));
                }
            } catch (e) {}
            isProcessing = false;
        }

        function processPlate(raw, img) {
            let p1 = raw.substring(0, 3).replace(/0/g, 'O').replace(/1/g, 'I').replace(/5/g, 'S').replace(/8/g, 'B');
            let p2 = raw.substring(3, 6).replace(/O/g, '0').replace(/I/g, '1').replace(/L/g, '1').replace(/S/g, '5').replace(/B/g, '8');
            const clean = p1 + p2;
            if (!/^[A-Z]{3}[0-9]{3}$/.test(clean)) return;

            const numValue = parseInt(p2);
            document.getElementById('live-plate').innerText = p1 + " " + p2;

            // --- SUCCÉ & PAUS LOGIK ---
            isPaused = true; // Stoppa skannern
            document.getElementById('sikte').classList.add('paused');
            playSuccessSound(); // Spela ljudet

            const isMatch = (numValue === currentTarget);
            const entry = { plate: clean, num: numValue, image: img, lat: lastPos?.latitude, lon: lastPos?.longitude, isMatch: isMatch, time: new Date().toLocaleString('sv-SE') };

            const tx = db.transaction("plates", "readwrite");
            tx.objectStore("plates").add(entry).onsuccess = () => {
                if (isMatch) {
                    currentTarget++;
                    localStorage.setItem('plateTarget', currentTarget);
                    updateTargetUI();
                    setTimeout(() => alert("TRÄFF! " + clean), 100);
                }
            };

            // Starta skannern igen efter 1.5 sekunder
            setTimeout(() => {
                isPaused = false;
                document.getElementById('sikte').classList.remove('paused');
            }, 1500);
        }

        function setManualTarget() {
            const val = prompt("Sätt nästa nummer:", currentTarget);
            if (val) {
                currentTarget = parseInt(val);
                localStorage.setItem('plateTarget', currentTarget);
                updateTargetUI();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }
        }

        function updateTargetUI() {
            document.getElementById('target-num').innerText = currentTarget.toString().padStart(3, '0');
        }

        function deleteEntry(id) {
            if (confirm("Radera?")) {
                const tx = db.transaction("plates", "readwrite");
                tx.objectStore("plates").delete(id);
                tx.oncomplete = () => renderArchive();
            }
        }

        function editEntry(id, oldPlate) {
            const val = prompt("Ändra till (Ex: OAX801):", oldPlate);
            if (val && val.length === 6) {
                const tx = db.transaction("plates", "readwrite");
                const store = tx.objectStore("plates");
                const getReq = store.get(id);
                getReq.onsuccess = () => {
                    const data = getReq.result;
                    data.plate = val.toUpperCase();
                    data.num = parseInt(data.plate.substring(3));
                    store.put(data);
                };
                tx.oncomplete = () => renderArchive();
            }
        }

        function renderArchive() {
            const filter = document.getElementById('search-num').value;
            const tx = db.transaction("plates", "readonly");
            tx.objectStore("plates").getAll().onsuccess = e => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                e.target.result.reverse().filter(i => !filter || i.num.toString().includes(filter)).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'plate-card';
                    card.innerHTML = `
                        <img src="${item.image}">
                        <div class="plate-card-info">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <strong>${item.plate}</strong>
                                <span style="font-size:10px; color:#888;">${item.time}</span>
                            </div>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="editEntry(${item.id}, '${item.plate}')">ÄNDRA</button>
                                <button class="btn btn-delete" onclick="deleteEntry(${item.id})">RADERA</button>
                                <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="btn btn-map">KARTA</a>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            };
        }
    </script>
</body>
</html>
