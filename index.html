<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateTracker Turbo</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        
        /* Kamera och sikte */
        #cam-container { position: sticky; top: 0; z-index: 100; background: #000; }
        video { width: 100%; height: 40vh; object-fit: cover; }
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60px; border: 2px solid var(--ios-green); border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* Statuspaneler */
        .dashboard { padding: 10px; background: #1c1c1e; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .next-box { text-align: center; background: #333; padding: 5px 15px; border-radius: 10px; border: 2px solid var(--ios-blue); }
        .live-debug { font-family: monospace; font-size: 12px; color: #00ff00; padding: 5px 10px; background: #000; }

        /* Lista */
        .log-list { padding: 10px; }
        .entry { background: #1c1c1e; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; padding: 10px; gap: 15px; border-left: 5px solid #444; }
        .entry.match { border-left-color: var(--ios-green); background: #1a2e1a; }
        .entry img { width: 100px; height: 60px; object-fit: cover; border-radius: 4px; }
        .entry-info { flex-grow: 1; }
        .btn-small { background: var(--ios-blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; text-decoration: none; }
    </style>
</head>
<body>

<div id="cam-container">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"></div>
    <div class="live-debug">Ser just nu: <span id="raw-ocr">...</span></div>
    <div class="dashboard">
        <div>
            <div style="font-size: 12px; color: #aaa;">STATUS</div>
            <div id="status-msg">Söker...</div>
        </div>
        <div class="next-box">
            <div style="font-size: 10px;">NÄSTA</div>
            <div id="target-num" style="font-size: 24px; font-weight: bold; color: var(--ios-blue);">001</div>
        </div>
    </div>
</div>

<div class="log-list" id="log-list"></div>

<canvas id="canvas" style="display:none;"></canvas>
<!-- Vi använder en mindre canvas för själva OCR-beskärningen -->
<canvas id="crop-canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let db;
    let currentTarget = 1;
    let isProcessing = false;
    const video = document.getElementById('video');
    
    // Starta DB
    const req = indexedDB.open("PlateTrackerTurbo", 2);
    req.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("plates")) {
            db.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
        }
    };
    req.onsuccess = e => { db = e.target.result; renderLog(); updateTarget(); };

    // Starta Kamera
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 } } 
    }).then(stream => { 
        video.srcObject = stream;
        // Starta loopen snabbare (varje sekund)
        setInterval(processFrame, 1000);
    });

    async function processFrame() {
        if (isProcessing) return;
        isProcessing = true;
        document.getElementById('status-msg').innerText = "Analyserar...";

        const canvas = document.getElementById('canvas');
        const cropCanvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const cropCtx = cropCanvas.getContext('2d');

        // 1. Rita hela bilden
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // 2. BESKÄR bilden (ta bara det som är i gröna rutan)
        // Vi räknar ut var rutan är i förhållande till videon
        const boxWidth = canvas.width * 0.8;
        const boxHeight = 100; // Fast höjd för beskärning
        const boxX = (canvas.width - boxWidth) / 2;
        const boxY = (canvas.height - boxHeight) / 2;

        cropCanvas.width = boxWidth;
        cropCanvas.height = boxHeight;
        cropCtx.drawImage(canvas, boxX, boxY, boxWidth, boxHeight, 0, 0, boxWidth, boxHeight);

        // Gör bilden svartvit för bättre OCR
        cropCtx.globalUint8ClampedArray = true;
        const imgData = cropCtx.getImageData(0, 0, boxWidth, boxHeight);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            data[i] = data[i+1] = data[i+2] = avg > 120 ? 255 : 0; // Tröskelvärde
        }
        cropCtx.putImageData(imgData, 0, 0);

        const dataUrl = cropCanvas.toDataURL('image/jpeg', 0.8);

        try {
            const result = await Tesseract.recognize(dataUrl, 'eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
                tessedit_pageseg_mode: '7' // Behandla bilden som en enda rad text
            });
            
            const text = result.data.text.trim().toUpperCase();
            document.getElementById('raw-ocr').innerText = text || "...";

            // Regex för svenska skyltar
            const match = text.match(/[A-Z]{3}[0-9]{2}[A-Z0-9]{1}/);

            if (match) {
                const plate = match[0];
                const digits = plate.match(/\d+/);
                const plateNum = digits ? parseInt(digits[0]) : -1;

                // Spara ALLA giltiga skyltar vi ser (men bara en gång per bil)
                await saveToDb(plate, plateNum, canvas.toDataURL('image/jpeg', 0.5));
            }
        } catch (e) { console.error(e); }

        isProcessing = false;
        document.getElementById('status-msg').innerText = "Söker...";
    }

    async function saveToDb(plate, num, fullImg) {
        // Kolla om vi nyss sparade denna (för att undvika dubbletter)
        const tx = db.transaction("plates", "readwrite");
        const store = tx.objectStore("plates");
        
        // Hämta position
        navigator.geolocation.getCurrentPosition(pos => {
            const isMatch = (num === currentTarget);
            const entry = {
                plate,
                num,
                image: fullImg,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                isMatch,
                time: new Date().toLocaleTimeString()
            };
            
            store.add(entry);
            if (isMatch) {
                currentTarget++;
                updateTarget();
                alert("MATCH! " + plate);
            }
            renderLog();
        });
    }

    function updateTarget() {
        document.getElementById('target-num').innerText = currentTarget.toString().padStart(3, '0');
    }

    function renderLog() {
        const tx = db.transaction("plates", "readonly");
        const request = tx.objectStore("plates").getAll();
        request.onsuccess = () => {
            const list = document.getElementById('log-list');
            list.innerHTML = '';
            request.result.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = `entry ${item.isMatch ? 'match' : ''}`;
                div.innerHTML = `
                    <img src="${item.image}">
                    <div class="entry-info">
                        <div style="font-weight:bold">${item.plate}</div>
                        <div style="font-size:10px">${item.time}</div>
                    </div>
                    <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="btn-small">Karta</a>
                `;
                list.appendChild(div);
            });
        };
    }
</script>
</body>
</html>
