<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateCollector v7 - GPS Fix</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; }
        
        #cam-box { position: sticky; top: 0; z-index: 100; background: #000; height: 40vh; border-bottom: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #sikte { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60px; border: 2px solid var(--ios-green); border-radius: 10px; pointer-events: none; }

        /* GPS Status Bar */
        .gps-status { background: #1c1c1e; padding: 5px 15px; font-size: 11px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .gps-good { color: var(--ios-green); }
        .gps-bad { color: var(--ios-red); }

        .dash { padding: 12px; background: #1c1c1e; display: flex; justify-content: space-between; align-items: center; }
        .target-box { background: var(--ios-red); padding: 8px 15px; border-radius: 10px; text-align: center; }
        
        #gallery { padding: 10px; }
        .card { background: #1c1c1e; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        .card img { width: 100%; height: auto; display: block; }
        .card-info { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn-map { background: var(--ios-blue); color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="cam-box">
    <video id="video" autoplay playsinline></video>
    <div id="sikte"></div>
</div>

<div class="gps-status">
    <span id="gps-label">GPS: Initierar...</span>
    <span id="gps-accuracy">---</span>
</div>

<div class="dash">
    <div>
        <div id="live-text" style="font-size: 22px; color: var(--ios-green); font-weight: bold;">Söker...</div>
        <div style="font-size: 10px; color: #888;">AI-skanning aktiv</div>
    </div>
    <div class="target-box">
        <div style="font-size: 10px;">NÄSTA</div>
        <div id="target-num" style="font-size: 26px; font-weight: bold;">001</div>
    </div>
</div>

<div id="gallery"></div>

<canvas id="full-canvas" style="display:none;"></canvas>
<canvas id="ocr-canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let db;
    let currentTarget = 1;
    let isProcessing = false;
    let lastPosition = null;
    const plateCooldowns = new Map();

    const video = document.getElementById('video');
    const targetDisplay = document.getElementById('target-num');
    const gpsLabel = document.getElementById('gps-label');
    const gpsAccuracy = document.getElementById('gps-accuracy');

    // --- 1. EXAKT GPS-SPÅRNING ---
    // Vi startar en "watchPosition" som körs hela tiden i bakgrunden
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(
            (pos) => {
                lastPosition = pos.coords;
                const acc = Math.round(pos.coords.accuracy);
                gpsAccuracy.innerText = `Precision: +/- ${acc}m`;
                
                if (acc < 20) {
                    gpsLabel.innerText = "GPS: BRA";
                    gpsLabel.className = "gps-good";
                } else {
                    gpsLabel.innerText = "GPS: SÖKER BÄTTRE...";
                    gpsLabel.className = "gps-bad";
                }
            },
            (err) => { gpsLabel.innerText = "GPS FEL: " + err.message; },
            { 
                enableHighAccuracy: true, // TVINGA GPS-CHIP
                maximumAge: 0,            // INGEN CACHAD DATA
                timeout: 10000 
            }
        );
    }

    // --- 2. DB & KAMERA ---
    const req = indexedDB.open("PlateCollectorV7", 1);
    req.onupgradeneeded = e => {
        const store = e.target.result.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
        store.createIndex("plate", "plate", { unique: false });
    };
    req.onsuccess = e => { db = e.target.result; updateTargetCounter(); renderGallery(); };

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 } } 
    }).then(stream => { 
        video.srcObject = stream;
        setInterval(capture, 1200); 
    });

    async function capture() {
        if (isProcessing || !db || video.videoWidth === 0) return;
        isProcessing = true;

        const fullCanvas = document.getElementById('full-canvas');
        fullCanvas.width = video.videoWidth; 
        fullCanvas.height = video.videoHeight;
        fullCanvas.getContext('2d').drawImage(video, 0, 0);

        // OCR-beskärning (samma som v6)
        const ocrCanvas = document.getElementById('ocr-canvas');
        const cW = fullCanvas.width * 0.8; const cH = fullCanvas.height * 0.2;
        const cX = (fullCanvas.width - cW) / 2; const cY = (fullCanvas.height - cH) / 2;
        ocrCanvas.width = cW; ocrCanvas.height = cH;
        ocrCanvas.getContext('2d').drawImage(fullCanvas, cX, cY, cW, cH, 0, 0, cW, cH);

        try {
            const result = await Tesseract.recognize(ocrCanvas.toDataURL('image/jpeg', 0.8), 'eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
                tessedit_pageseg_mode: '7'
            });
            const text = result.data.text.trim().toUpperCase();
            const match = text.match(/[A-Z]{3}[0-9]{2}[A-Z0-9]{1}/);
            
            if (match) {
                const plate = match[0];
                document.getElementById('live-text').innerText = plate;
                const num = parseInt(plate.match(/\d+/)[0]);
                await savePlate(plate, num, fullCanvas.toDataURL('image/jpeg', 0.6));
            }
        } catch (e) { console.error(e); }
        isProcessing = false;
    }

    async function savePlate(plate, num, imageUri) {
        const now = Date.now();
        if (plateCooldowns.has(plate) && (now - plateCooldowns.get(plate) < 300000)) return;
        if (!lastPosition) { console.log("Väntar på GPS..."); return; }

        const tx = db.transaction("plates", "readwrite");
        const store = tx.objectStore("plates");
        
        const countReq = store.index("plate").getAll(plate);
        countReq.onsuccess = () => {
            if (countReq.result.length >= 3) return;

            const isTarget = (num === currentTarget);
            const entry = {
                plate, num, image: imageUri,
                lat: lastPosition.latitude, 
                lon: lastPosition.longitude,
                isTarget, time: new Date().toLocaleString('sv-SE')
            };
            
            db.transaction("plates", "readwrite").objectStore("plates").add(entry).onsuccess = () => {
                plateCooldowns.set(plate, now);
                if (isTarget) alert("HITTAD! " + plate);
                updateTargetCounter();
                renderGallery();
            };
        };
    }

    function updateTargetCounter() {
        db.transaction("plates", "readonly").objectStore("plates").getAll().onsuccess = e => {
            const hits = e.target.result.filter(i => i.isTarget).map(i => i.num);
            let next = 1; while(hits.includes(next)) next++;
            currentTarget = next;
            targetDisplay.innerText = currentTarget.toString().padStart(3, '0');
        };
    }

    function renderGallery() {
        db.transaction("plates", "readonly").objectStore("plates").getAll().onsuccess = e => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            e.target.result.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}">
                    <div class="card-info">
                        <div>
                            <strong style="font-size:18px">${item.plate}</strong>
                            <div style="font-size:10px; color:#888">${item.time}</div>
                        </div>
                        <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="btn-map">📍 VISA PLATS</a>
                    </div>
                `;
                gallery.appendChild(card);
            });
        };
    }
</script>
</body>
</html>
