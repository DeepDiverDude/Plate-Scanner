<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateMaster 15.0 - Pro List</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30; --bg: #000; --card: #1c1c1e; --text: #fff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* Tabbar */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(28,28,30,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px); }
        .tab { text-align: center; color: #888; font-size: 11px; flex-grow: 1; border: none; background: none; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        .page { display: none; }
        .page.active { display: block; }

        /* SKANNER */
        #cam-container { position: relative; height: 45vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #sikte { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50%; height: 40px; border: 2px solid var(--ios-green); border-radius: 4px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none; transition: border-color 0.2s; }
        #sikte.paused { border-color: #ffcc00; }
        .scan-status { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .target-box { background: var(--ios-red); padding: 10px; border-radius: 10px; text-align: center; min-width: 70px; cursor: pointer; }

        /* ARKIV LISTA */
        .search-container { padding: 15px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        input#search-num { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--card); color: #fff; font-size: 18px; text-align: center; }
        
        .plate-list { padding: 0; margin: 0; list-style: none; }
        .plate-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #2c2c2e; cursor: pointer; }
        .plate-item:active { background: #2c2c2e; }
        .plate-item-main { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        .plate-item-sub { font-size: 12px; color: #8e8e93; }

        /* DETALJVY (MODAL) */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { padding: 20px; text-align: center; }
        .modal-img { width: 100%; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .modal-header { font-size: 32px; font-weight: bold; margin: 20px 0 5px; letter-spacing: 2px; }
        .modal-date { color: #8e8e93; margin-bottom: 20px; }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; color: white; text-align: center; text-decoration: none; }
        .btn-edit { background: #3a3a3c; color: var(--ios-blue); }
        .btn-delete { background: #3a3a3c; color: var(--ios-red); }
        .btn-map { background: var(--ios-blue); grid-column: span 2; }
        .btn-close { position: absolute; top: 20px; right: 20px; font-size: 30px; background: none; border: none; color: white; cursor: pointer; }

        #debug-log { font-family: monospace; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 4px; position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <!-- SKANNER-SIDA -->
    <div id="page-scan" class="page active">
        <div id="cam-container">
            <video id="video" autoplay playsinline></video>
            <div id="sikte"></div>
            <div id="debug-log">Initierar...</div>
        </div>
        <div class="scan-status">
            <div>
                <div style="font-size: 10px; color: #aaa;">IDENTIFIERAT</div>
                <div id="live-plate" style="font-size: 28px; font-weight: bold; color: var(--ios-green);">--- ---</div>
            </div>
            <div class="target-box" onclick="setManualTarget()">
                <div style="font-size: 9px;">NÄSTA</div>
                <div id="target-num" style="font-size: 28px; font-weight: bold;">001</div>
            </div>
        </div>
    </div>

    <!-- ARKIV-SIDA -->
    <div id="page-archive" class="page">
        <div class="search-container">
            <input type="number" id="search-num" placeholder="Sök siffra (t.ex. 001)" oninput="renderArchive()">
        </div>
        <ul id="plate-list" class="plate-list"></ul>
    </div>

    <!-- DETALJVY (MODAL) -->
    <div id="modal-overlay">
        <button class="btn-close" onclick="closeModal()">&times;</button>
        <div class="modal-content" id="modal-body">
            <!-- Innehåll laddas dynamiskt -->
        </div>
    </div>

    <!-- TABBAR -->
    <nav class="tab-bar">
        <button class="tab active" onclick="initAudioAndShow('scan')">📷 SKANNA</button>
        <button class="tab" onclick="showPage('archive')">🗂️ ARKIV</button>
    </nav>

    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <canvas id="ocr-canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        let db;
        let currentTarget = 1;
        let isProcessing = false;
        let isPaused = false;
        let lastPos = null;
        let audioCtx = null;

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'archive') renderArchive();
        }

        // --- LJUD ---
        function playSuccessSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function initAudioAndShow(id) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            showPage(id);
        }

        // --- DATABASE ---
        const req = indexedDB.open("PlateMasterV15", 1);
        req.onupgradeneeded = e => {
            const store = e.target.result.createObjectStore("plates", { keyPath: "id", autoIncrement: true });
            store.createIndex("num", "num", { unique: false });
        };
        req.onsuccess = e => { 
            db = e.target.result; 
            const saved = localStorage.getItem('plateTarget');
            if (saved) currentTarget = parseInt(saved);
            updateTargetUI(); 
        };

        navigator.geolocation.watchPosition(p => { lastPos = p.coords; }, null, { enableHighAccuracy: true });
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 } } })
            .then(s => { document.getElementById('video').srcObject = s; setInterval(doScan, 1000); });

        // --- SCANNING ---
        async function doScan() {
            if (isProcessing || isPaused || !db || !document.getElementById('page-scan').classList.contains('active')) return;
            isProcessing = true;

            const video = document.getElementById('video');
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const ocrCanvas = document.getElementById('ocr-canvas');
            const cropW = canvas.width * 0.35; const cropH = canvas.height * 0.12;
            ocrCanvas.width = cropW * 2; ocrCanvas.height = cropH * 2;
            const oCtx = ocrCanvas.getContext('2d');
            oCtx.drawImage(canvas, (canvas.width - cropW)/2, (canvas.height - cropH)/2, cropW, cropH, 0, 0, ocrCanvas.width, ocrCanvas.height);

            const imgData = oCtx.getImageData(0,0,ocrCanvas.width,ocrCanvas.height);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const v = (imgData.data[i] + imgData.data[i+1] + imgData.data[i+2]) / 3 > 125 ? 255 : 0;
                imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = v;
            }
            oCtx.putImageData(imgData, 0, 0);

            try {
                const res = await Tesseract.recognize(ocrCanvas.toDataURL(), 'eng');
                const raw = res.data.text.replace(/[^A-Z0-9]/g, '');
                document.getElementById('debug-log').innerText = "AI SER: " + raw;

                if (raw.length >= 6) {
                    const match = raw.substring(raw.length - 6);
                    processPlate(match, canvas.toDataURL('image/jpeg', 0.6));
                }
            } catch (e) {}
            isProcessing = false;
        }

        function processPlate(raw, img) {
            let p1 = raw.substring(0, 3).replace(/0/g, 'O').replace(/1/g, 'I').replace(/5/g, 'S').replace(/8/g, 'B');
            let p2 = raw.substring(3, 6).replace(/O/g, '0').replace(/I/g, '1').replace(/L/g, '1').replace(/S/g, '5').replace(/B/g, '8');
            const clean = p1 + p2;
            if (!/^[A-Z]{3}[0-9]{3}$/.test(clean)) return;

            const numValue = parseInt(p2);
            document.getElementById('live-plate').innerText = p1 + " " + p2;

            isPaused = true;
            document.getElementById('sikte').classList.add('paused');
            playSuccessSound();

            const isMatch = (numValue === currentTarget);
            const entry = { plate: clean, num: numValue, image: img, lat: lastPos?.latitude, lon: lastPos?.longitude, isMatch: isMatch, time: new Date().toLocaleString('sv-SE') };

            db.transaction("plates", "readwrite").objectStore("plates").add(entry).onsuccess = () => {
                if (isMatch) {
                    currentTarget++;
                    localStorage.setItem('plateTarget', currentTarget);
                    updateTargetUI();
                }
            };
            setTimeout(() => { isPaused = false; document.getElementById('sikte').classList.remove('paused'); }, 1500);
        }

        // --- LISTA & ARKIV ---
        function renderArchive() {
            const filter = document.getElementById('search-num').value;
            const tx = db.transaction("plates", "readonly");
            tx.objectStore("plates").getAll().onsuccess = e => {
                const listEl = document.getElementById('plate-list');
                listEl.innerHTML = '';
                
                // SORTERA: Numeriskt 001 först
                const items = e.target.result.sort((a, b) => a.num - b.num);

                items.filter(i => !filter || i.num.toString().padStart(3,'0').includes(filter)).forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'plate-item';
                    li.onclick = () => openModal(item);
                    li.innerHTML = `
                        <div class="plate-item-main">${item.plate.substring(0,3)} ${item.plate.substring(3)}</div>
                        <div class="plate-item-sub">${item.time.split(' ')[0]}</div>
                    `;
                    listEl.appendChild(li);
                });
            };
        }

        // --- MODAL (DETALJVY) ---
        function openModal(item) {
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div class="modal-header">${item.plate.substring(0,3)} ${item.plate.substring(3)}</div>
                <div class="modal-date">${item.time}</div>
                <img src="${item.image}" class="modal-img">
                <div class="modal-actions">
                    <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" class="btn btn-map">📍 VISA PÅ KARTA</a>
                    <button class="btn btn-edit" onclick="editEntry(${item.id}, '${item.plate}')">ÄNDRA</button>
                    <button class="btn btn-delete" onclick="deleteEntry(${item.id})">RADERA</button>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function deleteEntry(id) {
            if (confirm("Radera denna bild permanent?")) {
                const tx = db.transaction("plates", "readwrite");
                tx.objectStore("plates").delete(id);
                tx.oncomplete = () => { closeModal(); renderArchive(); };
            }
        }

        function editEntry(id, oldPlate) {
            const val = prompt("Ändra regnr (t.ex. ABC123):", oldPlate);
            if (val && val.length === 6) {
                const tx = db.transaction("plates", "readwrite");
                const store = tx.objectStore("plates");
                store.get(id).onsuccess = e => {
                    const data = e.target.result;
                    data.plate = val.toUpperCase();
                    data.num = parseInt(data.plate.substring(3));
                    store.put(data);
                };
                tx.oncomplete = () => { closeModal(); renderArchive(); };
            }
        }

        function setManualTarget() {
            const val = prompt("Sätt nästa nummer:", currentTarget);
            if (val) {
                currentTarget = parseInt(val);
                localStorage.setItem('plateTarget', currentTarget);
                updateTargetUI();
            }
        }

        function updateTargetUI() {
            document.getElementById('target-num').innerText = currentTarget.toString().padStart(3, '0');
        }
    </script>
</body>
</html>
